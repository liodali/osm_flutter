name: flutter_osm_plugin_example
description: Demonstrates how to use the flutter_osm_plugin plugin.
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.41.0"
dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  forui: ^0.21.3
  auto_route: ^10.1.2
  forui_assets: ^0.21.0
  flex_color_picker: ^3.7.1
  package_info_plus: ^10.1.0

  flutter_osm_plugin: #1.2.0 #^0.40.3+2
    path: ../
  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.5
  flutter_hooks: ^0.18.5+1
  #osm_flutter_hooks: ^1.4.0
  pointer_interceptor: ^0.10.1+2
  routing_client_dart: ^0.5.5
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5
  hive_ce: ^2.19.2
  hive_ce_flutter: ^2.2.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.1

#dependency_overrides:
    # permission_handler_html: 0.1.3+2
    # url_launcher_web: 2.3.3
    # web: 1.0.0
    #flutter_osm_plugin: #^0.70.3
    #  path: ../
  

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
     - asset/
  #  - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware.

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages

flutter_launcher_icons:
  android: true
  ios: true
  image_path: ../osm_logo_new.png
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  android: true
  ios: true
  color: "#ffffff"
  image: ../osm_logo_new.png
  android_gravity: center
  ios_content_mode: center
  android_12:
    color: "#ffffff"
    image: ../osm_logo_new.png
    icon_background_color: "#ffffff"
