name: Deploy Example Android to Play Store

on:
  push:
    tags:
      - 'app-v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      track:
        description: 'Google Play release track'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: example

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set track from input or default to internal for tags
        id: track
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "track=${{ inputs.track }}" >> "$GITHUB_OUTPUT"
          else
            echo "track=internal" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=app/keystore.jks
          EOF

      - name: Decode Google Play Service Account
        run: |
          mkdir -p android/fastlane
          echo '${{ secrets.SERVICE_ACCOUNT_JSON }}' > android/fastlane/service-account.json

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Upload to Google Play (Internal Testing)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          # serviceAccountJson: example/android/fastlane/service-account.json
          packageName: hamza.dali.flutter_osm_plugin_example
          releaseFiles: example/build/app/outputs/bundle/release/app-release.aab
          track: ${{ steps.track.outputs.track }}
          status: completed
